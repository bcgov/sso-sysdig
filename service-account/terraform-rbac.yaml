# terraform-rbac.yaml
# Service account for Terraform state operations
apiVersion: v1
kind: ServiceAccount
metadata:
  name: terraform-sysdig
  namespace: e4ca1d-tools
---
# Role that allows managing secrets in the terraform-state namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: terraform-sysdig-state-manager
  namespace: e4ca1d-tools
rules:
  # Permissions for state storage (Secrets)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "update", "patch", "delete"]
  # Permissions for state locking (Leases)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "delete"]

---
# Bind the role to the service account
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: terraform-sysdig-state-manager
  namespace: e4ca1d-tools
subjects:
  - kind: ServiceAccount
    name: terraform-sysdig
    namespace: e4ca1d-tools
roleRef:
  kind: Role
  name: terraform-sysdig-state-manager
  apiGroup: rbac.authorization.k8s.io
